<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MxFramework 外部编辑器中心</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect y=%2210%22 width=%22100%22 height=%2280%22 rx=%2215%22 fill=%22%231f7a7a%22/><path d=%22M30 40 L50 65 L70 40%22 stroke=%22white%22 stroke-width=%2210%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 fill=%22none%22/></svg>">
</head>
<body>
  <main class="shell">
    <!-- 顶部状态与控制栏 -->
    <header class="topbar">
      <div class="brand">
        <div class="logo-container">
          <svg class="brand-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
        </div>
        <div class="brand-text">
          <h1>MxFramework</h1>
          <div class="sub-row">
            <span class="hub-badge">Editor Hub</span>
            <p id="serverStatus">正在检测 Authoring 服务...</p>
          </div>
        </div>
      </div>

      <div class="toolbar">
        <div class="package-field">
          <label for="packageSelect">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="field-icon">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            </svg>
            当前角色包
          </label>
          <div class="select-wrapper">
            <select id="packageSelect"></select>
          </div>
        </div>
        <button id="refreshButton" type="button" class="btn-refresh">
          <svg class="refresh-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 19 10"></polyline>
            <polyline points="1 20 1 14 5 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          <span>刷新服务</span>
        </button>
      </div>
    </header>

    <!-- 快捷服务状态条 -->
    <section class="status-strip" id="statusStrip" aria-label="服务状态"></section>

    <!-- 工具与编辑器卡片 -->
    <section class="tool-section">
      <div class="section-title-row">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="title-icon">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
        </svg>
        <h2>外部编辑器与工作站</h2>
      </div>
      <section class="tool-grid" id="toolGrid" aria-label="外部编辑器入口"></section>
    </section>

    <!-- 资源与规划实时监控面板 -->
    <section class="resource-panels">
      <!-- 资源库状态 -->
      <article class="panel">
        <div class="panel-header">
          <div class="panel-title-group">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="panel-icon">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            <div>
              <h2>资源库状态</h2>
              <p id="resourceSummary">未读取</p>
            </div>
          </div>
          <span class="panel-tag">实时同步</span>
        </div>
        <div class="resource-list-container">
          <div class="resource-list" id="resourceList"></div>
        </div>
      </article>

      <!-- 资源计划预览 -->
      <article class="panel">
        <div class="panel-header">
          <div class="panel-title-group">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="panel-icon">
              <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
              <polyline points="2 17 12 22 22 17"></polyline>
              <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
            <div>
              <h2>资源计划预览</h2>
              <p id="planSummary">未读取</p>
            </div>
          </div>
          <span class="panel-tag">加载时序</span>
        </div>
        <div class="plan-grid-container">
          <div class="plan-grid" id="planGrid"></div>
        </div>
      </article>
    </section>

    <!-- 实时交互式诊断与问题控制台 (全新交互体验) -->
    <section class="panel diagnostics-panel">
      <div class="panel-header">
        <div class="panel-title-group">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="panel-icon diag-icon">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
          <div>
            <h2>诊断与集成控制台</h2>
            <p id="diagnosticsSummary">正在扫描诊断信息...</p>
          </div>
        </div>
        <div class="diagnostics-toolbar">
          <div class="console-search">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="diagnosticsSearch" placeholder="搜索错误、组件或代码..." aria-label="搜索诊断">
          </div>
          <div class="filter-wrapper">
            <select id="diagnosticsFilter" aria-label="过滤级别">
              <option value="all">所有级别</option>
              <option value="Error">❌ 仅错误 (Error)</option>
              <option value="Warning">⚠️ 仅警告 (Warning)</option>
              <option value="Info">ℹ️ 仅消息 (Info)</option>
            </select>
          </div>
          <button id="copyDiagnosticsButton" type="button" class="btn-copy">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="copy-icon">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <span>复制 JSON 诊断</span>
          </button>
        </div>
      </div>
      <div class="console-body">
        <div class="console-header">
          <div class="col-type">级别</div>
          <div class="col-code">代码</div>
          <div class="col-msg">异常与描述信息</div>
        </div>
        <div class="diagnostics-console" id="diagnosticsConsole"></div>
      </div>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
