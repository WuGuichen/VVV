<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MxFramework Authoring Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1 style="display: flex; align-items: center; gap: 10px; color: var(--accent-strong);">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
          Buff 主创编辑器
        </h1>
        <div id="projectSummary" class="subtle" style="margin-top: 4px;">正在读取项目工作包...</div>
      </div>
      <div class="top-actions">
        <label class="mode-selector" title="模式切换">
          模式：
          <select id="modeSelect">
            <option value="Mod">Mod Mode</option>
            <option value="Developer">Developer Mode</option>
          </select>
        </label>
        <button id="newBuffButton" type="button" class="secondary" title="新建 Buff 草稿">+ 新建 Buff</button>
        <button id="reloadButton" type="button" class="secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
          刷新
        </button>
        <button id="copyContextButton" type="button" class="secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          复制上下文
        </button>
        <button id="previewButton" type="button" class="secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          运行时预览
        </button>
        <button id="exportRuntimePatchButton" type="button" class="secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          导出运行时 Patch
        </button>
        <button id="generateReportButton" type="button" class="secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          生成报告
        </button>
        <button id="savePatchButton" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
          保存 Patch
        </button>
      </div>
    </header>

    <main class="workspace">
      <aside class="sidebar">
        <section class="panel">
          <div class="section-heading" style="padding-bottom: 0; border-bottom: none; margin-bottom: 0;">
            <h2 style="display: flex; align-items: center; gap: 8px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
              项目 / Mod
            </h2>
          </div>
          <div id="packageSummary" class="summary-list"></div>
        </section>
        <section class="panel">
          <div class="section-heading" style="padding-bottom: 0; border-bottom: none; margin-bottom: 0;">
            <h2 style="display: flex; align-items: center; gap: 8px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
              Buff 列表
            </h2>
          </div>
          <div id="buffList" class="item-list"></div>
        </section>
      </aside>

      <section class="main-panel">
        <nav id="workflowSteps" class="step-list" aria-label="创建流程"></nav>

        <section class="panel hero-panel">
          <div>
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 16 16 12 12 8"></polyline><line x1="8" y1="12" x2="16" y2="12"></line></svg>
              <h2 id="stepTitle" style="font-size: 18px;">流程</h2>
            </div>
            <p id="stepDescription" class="body-text"></p>
          </div>
          <div id="stepMeta" class="badge-row"></div>
        </section>

        <section class="split-content">
          <div class="panel">
            <div class="section-heading">
              <h2 style="display: flex; align-items: center; gap: 8px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                字段草稿
              </h2>
              <span id="draftStatus" class="status-pill">可编辑草稿</span>
            </div>
            <div id="fieldEditor" class="field-editor"></div>
          </div>

          <div class="panel">
            <div class="section-heading">
              <h2 style="display: flex; align-items: center; gap: 8px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                枚举 / 引用
              </h2>
              <span>Manifest</span>
            </div>
            <div id="enumReferenceView" class="stack"></div>
          </div>
        </section>
      </section>

      <aside class="inspector">
        <section class="panel">
          <div class="section-heading" style="padding-bottom: 0; border-bottom: none; margin-bottom: 0;">
            <h2>诊断</h2>
          </div>
          <div class="section-actions">
            <button id="diagnoseRefreshButton" type="button">刷新诊断</button>
            <button id="diagnoseCopyJsonButton" type="button" class="secondary">复制诊断 JSON</button>
          </div>
          <div id="diagnoseConfigView" class="stack"></div>
          <div id="diagnoseSummaryView" class="stack"></div>
          <div id="diagnosePackagesView" class="stack"></div>
          <div id="diagnoseLoadoutView" class="stack"></div>
          <div id="diagnoseLoadPlanView" class="stack"></div>
          <div id="diagnoseOverridesView" class="stack"></div>
          <div id="diagnoseIssuesView" class="stack"></div>
        </section>
        <section class="panel">
          <div class="section-heading" style="padding-bottom: 0; border-bottom: none; margin-bottom: 0;">
            <h2 style="display: flex; align-items: center; gap: 8px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
              校验报告
            </h2>
          </div>
          <div id="validationView" class="stack"></div>
        </section>
        <section class="panel">
          <div class="section-heading" style="padding-bottom: 0; border-bottom: none; margin-bottom: 0;">
            <h2 style="display: flex; align-items: center; gap: 8px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"></path><path d="M4 20L21 3"></path><path d="M21 16v5h-5"></path><path d="M15 15l6 6"></path><path d="M4 4l5 5"></path></svg>
              合并预览
            </h2>
          </div>
          <div id="mergePreviewView" class="stack"></div>
        </section>
        <section class="panel">
          <div class="section-heading" style="padding-bottom: 0; border-bottom: none; margin-bottom: 0;">
            <h2 style="display: flex; align-items: center; gap: 8px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
              运行时预览
            </h2>
          </div>
          <div id="runtimePreviewView" class="stack"></div>
        </section>
        <section class="panel">
          <div class="section-heading" style="padding-bottom: 0; border-bottom: none; margin-bottom: 0;">
            <h2 style="display: flex; align-items: center; gap: 8px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
              多语言
            </h2>
          </div>
          <div class="section-actions">
            <button id="addLocalizationButton" type="button" class="secondary">+ 新增多语言</button>
            <button id="saveLocalizationButton" type="button">保存多语言</button>
          </div>
          <div id="localizationView" class="stack"></div>
        </section>
      </aside>
    </main>
  </div>

  <div id="newBuffModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="newBuffTitle">
    <div class="modal-content">
      <header class="modal-header">
        <h2 id="newBuffTitle">新建 Buff 草稿</h2>
        <button id="newBuffCloseButton" type="button" class="secondary" aria-label="关闭">×</button>
      </header>
      <div class="modal-body">
        <label class="form-row">
          <span>BuffType（类型）</span>
          <select id="newBuffType"></select>
        </label>
        <label class="form-row">
          <span>Buff Id（去重校验）</span>
          <input id="newBuffId" type="text" placeholder="例如 100501">
        </label>
        <label class="form-row">
          <span>Buff Name（多语言 key）</span>
          <input id="newBuffName" type="text" placeholder="自动建议 mod.{packageId}.buff.{id}.name">
        </label>
        <div id="newBuffWarning" class="hint"></div>
      </div>
      <footer class="modal-footer">
        <button id="newBuffCancelButton" type="button" class="secondary">取消</button>
        <button id="newBuffConfirmButton" type="button">确认创建</button>
      </footer>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
