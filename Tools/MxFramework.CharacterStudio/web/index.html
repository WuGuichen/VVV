<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MxFramework CharacterStudio</title>
  <link rel="stylesheet" href="./styles.css">
  <script type="importmap">
    {
      "imports": {
        "three": "../node_modules/three/build/three.module.js",
        "three/addons/": "../node_modules/three/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="app">
    <div class="top-panel-container" id="topPanelContainer">
      <header class="topbar">
        <div>
          <h1>CharacterStudio</h1>
          <p id="subtitle">角色资源包外部装配工作台</p>
        </div>
        <div class="toolbar">
          <select id="packageSelect" title="角色资源包"></select>
          <select id="modelImportRole" title="模型用途">
            <option value="body">角色主体模型</option>
            <option value="mainHand">主手槽武器模型</option>
            <option value="offHand">副手槽武器模型</option>
            <option value="preview">仅导入资源</option>
          </select>
          <input id="modelFileInput" type="file" accept=".glb,.gltf,.fbx,model/gltf-binary,model/gltf+json" hidden>
          <button id="modelImportButton" type="button" title="导入 GLB/GLTF，或将 FBX 转换为 GLB 后写入当前角色资源包">导入源资源</button>
          <button id="reloadButton" type="button" title="重新加载资源包">刷新</button>
          <button id="saveButton" type="button" title="校验并保存资源包草稿">保存</button>
          <button id="compileButton" type="button" title="运行 Character compile，预检 Prefab 重建输入">Prefab 重建预检</button>
          <button id="importButton" type="button" title="把当前资源包资源导入 Unity 工程">Unity 导入</button>
        </div>
      </header>
    </div>

    <main id="workspace" class="workspace">
      <aside class="tree-panel">
        <div class="panel-heading">
          <h2>资源包</h2>
          <div class="panel-actions">
            <span id="dirtyBadge" class="badge">clean</span>
            <button id="treeCollapseButton" class="icon-button" type="button" title="折叠资源包栏" aria-label="折叠资源包栏">‹</button>
          </div>
        </div>
        <div id="packageSummary" class="summary"></div>
        <div class="create-config">
          <select id="configCreateSelect" title="选择要新增的配置类型">
            <option value="weapon">武器配置</option>
            <option value="socket">挂点</option>
            <option value="trace">攻击轨迹</option>
            <option value="collider">碰撞体</option>
            <option value="part">身体部位</option>
          </select>
          <button id="configCreateButton" type="button" title="新增配置项">新增</button>
        </div>
        <nav id="packageTree" class="tree" aria-label="Package resource tree"></nav>
      </aside>

      <section class="viewport-panel">
        <div class="panel-heading">
          <h2>3D 预览</h2>
          <div class="segmented" id="layerToggles">
            <button data-layer="colliders" class="active" type="button">碰撞体</button>
            <button data-layer="sockets" class="active" type="button">挂点</button>
            <button data-layer="traces" class="active" type="button">轨迹</button>
            <button data-layer="weapons" class="active" type="button">武器</button>
          </div>
        </div>
        <div id="loadoutTabs" class="tabs"></div>
        <div class="preview-controls" aria-label="Preview controls">
          <label>姿势<select id="previewPoseSelect"></select></label>
          <label>骨骼运动<select id="previewMotionSelect"></select></label>
          <button id="resetCameraButton" type="button" title="重置 3D 预览镜头">重置镜头</button>
        </div>
        <div class="resource-binding-bar">
          <strong>模型引用</strong>
          <span id="resourceBindingTarget">选择当前字段后再绑定资源</span>
          <button id="openResourcePickerButton" type="button" title="为当前字段选择已有资源">选择已有资源</button>
          <button id="clearModelBindingButton" type="button" title="只清空当前字段的模型引用，不删除资源库资源">清空引用</button>
        </div>
        <details id="animationPanel" class="animation-config-panel" open>
          <summary class="animation-config-head">
            <strong>动画配置</strong>
            <span>通过资源选择器绑定 Profile 槽位，不手填 ResourceKey</span>
          </summary>
          <div id="animationConfigPanel" class="animation-config-grid" aria-label="Animation profile configuration"></div>
        </details>
        <details id="resourcePlanPanel" class="resource-plan-preview">
          <summary class="resource-plan-head">
            <strong>运行时资源计划</strong>
            <span>展开查看 Spawn / Equipment / Warmup / UI / Audio 编排</span>
          </summary>
          <div id="resourcePlanPreview" class="resource-plan-grid" aria-label="Character resource plan preview"></div>
        </details>
        <div id="viewport" class="viewport" aria-label="Character viewport"></div>
      </section>

      <aside class="inspector-panel">
        <section>
          <div class="panel-heading">
            <h2>属性</h2>
            <span id="selectionBadge" class="badge">none</span>
          </div>
          <div id="inspector" class="inspector"></div>
        </section>

        <section>
          <div class="panel-heading">
            <h2>诊断</h2>
            <button id="copyReportButton" type="button" title="复制诊断、Unity 导入和同步报告">查看/复制报告</button>
          </div>
          <div id="diagnostics" class="diagnostics"></div>
        </section>

        <section>
          <div class="panel-heading">
            <h2>Unity 导入</h2>
          </div>
          <div id="importStatus" class="diagnostics"></div>
        </section>
      </aside>
    </main>
  </div>

  <div id="resourcePickerOverlay" class="modal-overlay" hidden>
    <section class="resource-picker" role="dialog" aria-modal="true" aria-labelledby="resourcePickerTitle">
      <div class="resource-picker-head">
        <div>
          <h2 id="resourcePickerTitle">选择资源</h2>
          <p id="resourcePickerSummary">资源库由独立 Resource Library Editor 管理，这里只选择当前字段引用。</p>
        </div>
        <button id="closeResourcePickerButton" class="icon-button" type="button" title="关闭资源选择器" aria-label="关闭资源选择器">×</button>
      </div>
      <div id="resourcePickerList" class="model-resource-list" aria-label="Field resource picker"></div>
    </section>
  </div>

  <button id="topToggleBtn" class="panel-toggle-btn top-toggle" type="button" title="折叠/展开顶栏">
    <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" /></svg>
  </button>

  <script type="module" src="./app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const topContainer = document.getElementById("topPanelContainer");
      const topToggle = document.getElementById("topToggleBtn");

      function updateTogglePositions() {
        if (!topContainer.classList.contains("collapsed")) {
          const rect = topContainer.getBoundingClientRect();
          topToggle.style.top = `${rect.bottom - 1}px`;
        } else {
          topToggle.style.top = '0px';
        }
      }

      topToggle.addEventListener("click", () => {
        topContainer.classList.toggle("collapsed");
        topToggle.classList.toggle("floating");
        const svg = topToggle.querySelector("svg");
        if (topContainer.classList.contains("collapsed")) {
          svg.style.transform = "rotate(180deg)";
        } else {
          svg.style.transform = "rotate(0deg)";
        }
        setTimeout(updateTogglePositions, 350);
      });

      window.addEventListener("resize", updateTogglePositions);

      // Safety settlements
      setTimeout(updateTogglePositions, 100);
      setTimeout(updateTogglePositions, 500);
      setTimeout(updateTogglePositions, 2000);
    });
  </script>
</body>
</html>
