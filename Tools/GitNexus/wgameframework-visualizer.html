<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WGameFramework GitNexus Graph</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0f14;
      color: #e8edf7;
    }
    body { margin: 0; overflow: hidden; }
    .shell { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
    aside {
      border-right: 1px solid #252b36;
      background: #121722;
      padding: 18px;
      overflow: auto;
    }
    h1 { margin: 0 0 8px; font-size: 18px; font-weight: 650; }
    .muted { color: #8d99ad; font-size: 12px; line-height: 1.45; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 18px 0; }
    .stat { border: 1px solid #283041; border-radius: 6px; padding: 10px; background: #171d2a; }
    .stat b { display: block; font-size: 20px; }
    .stat span { color: #9ba7bb; font-size: 12px; }
    label { display: block; margin: 12px 0 6px; color: #aeb8ca; font-size: 12px; }
    input, select {
      box-sizing: border-box;
      width: 100%;
      border: 1px solid #2b3448;
      border-radius: 6px;
      background: #0d111a;
      color: #e8edf7;
      padding: 8px 10px;
      outline: none;
    }
    button {
      border: 1px solid #3a4660;
      border-radius: 6px;
      background: #1c2433;
      color: #eef4ff;
      padding: 8px 10px;
      cursor: pointer;
    }
    button:hover { background: #263146; }
    .row { display: flex; gap: 8px; margin-top: 10px; }
    .row > button { flex: 1; }
    #details {
      margin-top: 16px;
      border-top: 1px solid #252b36;
      padding-top: 14px;
      font-size: 12px;
      color: #c7d0df;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    main { position: relative; background: radial-gradient(circle at 50% 45%, #192238, #080a0f 62%); }
    svg { width: 100%; height: 100%; display: block; }
    .link { stroke: #42506a; stroke-opacity: .48; }
    .node { cursor: pointer; }
    .node circle { stroke: #0d0f14; stroke-width: 1.5; }
    .node text { fill: #dbe4f2; font-size: 10px; paint-order: stroke; stroke: #080a0f; stroke-width: 3px; }
    .selected circle { stroke: #ffffff; stroke-width: 2.5; }
    .badge {
      position: absolute;
      right: 14px;
      bottom: 12px;
      color: #9ba7bb;
      font-size: 12px;
      background: rgba(13, 17, 26, .82);
      border: 1px solid #283041;
      border-radius: 6px;
      padding: 7px 10px;
    }
    .error { color: #ff8080; }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <h1>WGameFramework</h1>
      <div class="muted">GitNexus local graph view. Data source: <code>localhost:4747</code>.</div>
      <div class="stats">
        <div class="stat"><b id="nodeCount">-</b><span>nodes</span></div>
        <div class="stat"><b id="edgeCount">-</b><span>edges</span></div>
        <div class="stat"><b id="clusterCount">-</b><span>clusters</span></div>
        <div class="stat"><b id="processCount">-</b><span>processes</span></div>
      </div>
      <label for="search">Search</label>
      <input id="search" placeholder="Heap, Attributes, Docs...">
      <label for="typeFilter">Node Type</label>
      <select id="typeFilter">
        <option value="">All</option>
      </select>
      <div class="row">
        <button id="reset">Reset</button>
        <button id="reload">Reload</button>
      </div>
      <div id="details">Click a node to inspect it.</div>
    </aside>
    <main>
      <svg id="graph" role="img" aria-label="WGameFramework dependency graph"></svg>
      <div class="badge">Drag nodes · search filters labels · wheel zoom is browser-level</div>
    </main>
  </div>
  <script>
    const api = 'http://localhost:4747';
    const svg = document.getElementById('graph');
    const details = document.getElementById('details');
    const search = document.getElementById('search');
    const typeFilter = document.getElementById('typeFilter');
    let allNodes = [];
    let allLinks = [];
    let selected = null;
    let raf = 0;

    const colors = {
      File: '#6ba6ff',
      Folder: '#aab4c4',
      Community: '#c77dff',
      Process: '#54d6a8',
      Class: '#ffd166',
      Method: '#ff8fab',
      Function: '#ff8fab',
      Interface: '#7bdff2',
      Struct: '#f4a261',
      Enum: '#e9c46a',
      Field: '#b8c0ff',
      Property: '#b8c0ff'
    };

    function labelOf(node) {
      return node.properties?.name || node.properties?.label || node.id;
    }

    function radiusOf(node) {
      if (node.label === 'Community') return 13;
      if (node.label === 'Process') return 11;
      if (node.label === 'File') return 8;
      return 6;
    }

    async function load() {
      details.textContent = 'Loading GitNexus graph...';
      const [repos, graph, clusters, processes] = await Promise.all([
        fetch(`${api}/api/repos`).then(r => r.json()),
        fetch(`${api}/api/graph?repo=WGameFramework`).then(r => r.json()),
        fetch(`${api}/api/clusters?repo=WGameFramework`).then(r => r.json()),
        fetch(`${api}/api/processes?repo=WGameFramework`).then(r => r.json())
      ]);
      const repo = repos.find(r => r.name === 'WGameFramework') || repos[0];
      allNodes = graph.nodes.map((n, i) => ({ ...n, x: 140 + (i % 28) * 32, y: 90 + Math.floor(i / 28) * 28, vx: 0, vy: 0 }));
      const ids = new Set(allNodes.map(n => n.id));
      allLinks = graph.relationships
        .filter(l => ids.has(l.sourceId || l.source) && ids.has(l.targetId || l.target))
        .map(l => ({ ...l, source: l.sourceId || l.source, target: l.targetId || l.target }));

      document.getElementById('nodeCount').textContent = repo?.stats?.nodes ?? allNodes.length;
      document.getElementById('edgeCount').textContent = repo?.stats?.edges ?? allLinks.length;
      document.getElementById('clusterCount').textContent = repo?.stats?.communities ?? clusters.clusters?.length ?? '-';
      document.getElementById('processCount').textContent = repo?.stats?.processes ?? processes.processes?.length ?? '-';

      const types = [...new Set(allNodes.map(n => n.label))].sort();
      typeFilter.innerHTML = '<option value="">All</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
      details.textContent = `Indexed ${repo?.path || 'WGameFramework'}\\n${allNodes.length} visible nodes loaded.`;
      render();
    }

    function filteredNodes() {
      const q = search.value.trim().toLowerCase();
      const type = typeFilter.value;
      return allNodes.filter(n => (!type || n.label === type) && (!q || `${labelOf(n)} ${n.id} ${n.properties?.filePath || ''}`.toLowerCase().includes(q)));
    }

    function render() {
      cancelAnimationFrame(raf);
      const nodes = filteredNodes();
      const nodeIds = new Set(nodes.map(n => n.id));
      const links = allLinks.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));
      const w = svg.clientWidth || 900;
      const h = svg.clientHeight || 700;
      const nodeById = new Map(nodes.map(n => [n.id, n]));
      svg.innerHTML = '';
      const linkLayer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      const nodeLayer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      svg.append(linkLayer, nodeLayer);

      const linkEls = links.map(l => {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.classList.add('link');
        line.setAttribute('stroke-width', l.confidence ? String(1 + Number(l.confidence)) : '1');
        linkLayer.appendChild(line);
        return { l, line };
      });

      const nodeEls = nodes.map(n => {
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.classList.add('node');
        if (selected === n.id) g.classList.add('selected');
        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('r', radiusOf(n));
        c.setAttribute('fill', colors[n.label] || '#98c1d9');
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', radiusOf(n) + 4);
        t.setAttribute('y', '3');
        t.textContent = labelOf(n).slice(0, 34);
        g.append(c, t);
        g.addEventListener('click', () => {
          selected = n.id;
          details.textContent = JSON.stringify({
            id: n.id,
            type: n.label,
            name: labelOf(n),
            filePath: n.properties?.filePath,
            startLine: n.properties?.startLine,
            endLine: n.properties?.endLine
          }, null, 2);
          render();
        });
        nodeLayer.appendChild(g);
        return { n, g };
      });

      let tick = 0;
      function step() {
        for (const { l } of linkEls) {
          const a = nodeById.get(l.source);
          const b = nodeById.get(l.target);
          if (!a || !b) continue;
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.max(1, Math.hypot(dx, dy));
          const force = (dist - 85) * 0.002;
          const fx = dx / dist * force;
          const fy = dy / dist * force;
          a.vx += fx; a.vy += fy;
          b.vx -= fx; b.vy -= fy;
        }
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const a = nodes[i], b = nodes[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const d2 = Math.max(16, dx * dx + dy * dy);
            if (d2 > 9000) continue;
            const f = 12 / d2;
            a.vx -= dx * f; a.vy -= dy * f;
            b.vx += dx * f; b.vy += dy * f;
          }
        }
        for (const n of nodes) {
          n.vx += (w / 2 - n.x) * 0.0008;
          n.vy += (h / 2 - n.y) * 0.0008;
          n.x = Math.max(20, Math.min(w - 220, n.x + n.vx));
          n.y = Math.max(20, Math.min(h - 20, n.y + n.vy));
          n.vx *= 0.82;
          n.vy *= 0.82;
        }
        for (const { l, line } of linkEls) {
          const a = nodeById.get(l.source), b = nodeById.get(l.target);
          if (!a || !b) continue;
          line.setAttribute('x1', a.x);
          line.setAttribute('y1', a.y);
          line.setAttribute('x2', b.x);
          line.setAttribute('y2', b.y);
        }
        for (const { n, g } of nodeEls) {
          g.setAttribute('transform', `translate(${n.x},${n.y})`);
        }
        tick++;
        if (tick < 260) raf = requestAnimationFrame(step);
      }
      step();
    }

    search.addEventListener('input', render);
    typeFilter.addEventListener('change', render);
    document.getElementById('reset').addEventListener('click', () => { search.value = ''; typeFilter.value = ''; selected = null; render(); });
    document.getElementById('reload').addEventListener('click', () => load().catch(showError));
    function showError(err) {
      details.innerHTML = `<span class="error">${String(err.message || err)}</span>`;
    }
    load().catch(showError);
  </script>
</body>
</html>
